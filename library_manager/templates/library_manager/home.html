{% extends "library_manager/base.html" %}

{% block title_name %}Home{% endblock title_name %}

{% block body %}
<div class="container d-flex flex-row align-items-center">
    <div class='container my-5 py-5 bg-light bg-opacity-25 shadow-lg border border-light border-opacity-25 rounded-5'>
        <h1 class="text-primary"><u><a href='{% url "lib_mngr:home" %}'>OpenShelf</a></u></h1>
        <h6>Where You Can Manage BOOKs and AUTHORs</h6>
    </div>

    <div class="container w-50 d-flex flex-column">
        <a href="{% url 'lib_mngr:list' entity='book' %}"
            class='p-2 m-1 bg-light bg-opacity-25 shadow-lg border border-opacity-25 border-light rounded-4 link-primary link-opacity-25-hover link-underline-opacity-0'>Show
            Books</a>
        <a href="{% url 'lib_mngr:list' entity='author' %}"
            class='p-2 m-1 bg-light bg-opacity-25 shadow-lg border border-opacity-25 border-light rounded-4 link-primary link-opacity-25-hover link-underline-opacity-0'>Show
            Authors</a>
        <a href="{% url 'lib_mngr:add' entity='book' %}"
            class='p-2 m-1 bg-light bg-opacity-25 shadow-lg border border-opacity-25 border-light rounded-4 link-primary link-opacity-25-hover link-underline-opacity-0'>Add
            Book</a>
        <a href="{% url 'lib_mngr:add' entity='author' %}"
            class='p-2 m-1 bg-light bg-opacity-25 shadow-lg border border-opacity-25 border-light rounded-4 link-primary link-opacity-25-hover link-underline-opacity-0'>Add
            Author</a>
    </div>
</div>

<div class='container my-5 text-center'>
    {% block result %}{% endblock result %}
</div>

{% endblock body %}
